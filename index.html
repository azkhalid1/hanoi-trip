      {tab===3&&<div style={{padding:"14px"}}>
        {INFO.map((sec)=><div key={sec.id} style={{marginBottom:"10px"}}>
          <button onClick={()=>setInfo(info===sec.id?null:sec.id)} style={{width:"100%",background:info===sec.id?sec.color:"#1e293b",border:`1px solid ${info===sec.id?sec.accent+"44":"#334155"}`,borderRadius:"10px",padding:"12px 14px",color:"#f1f5f9",fontSize:"13px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <span>{sec.icon} {sec.title}</span>
            <span style={{color:sec.accent,fontSize:"12px"}}>{info===sec.id?"▲":"▼"}</span>
          </button>
          {info===sec.id&&<div style={{background:sec.color,border:`1px solid ${sec.accent}33`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:"12px 14px"}}>
            {sec.items.map((item,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<sec.items.length-1?`1px solid ${sec.accent}22`:"none",gap:"10px"}}>
              <div style={{fontSize:"11px",color:"#94a3b8",flexShrink:0,minWidth:"90px"}}>{item.label}</div>
              <div style={{fontSize:"11px",fontWeight:"600",color:item.warn?"#fbbf24":"#f1f5f9",textAlign:"left"}}>{item.value}</div>
            </div>)}
          </div>}
        </div>)}
        <div style={{background:"#1a1a2e",border:"1px solid #4c1d95",borderRadius:"12px",padding:"12px",marginTop:"4px"}}>
          <div style={{fontSize:"13px",fontWeight:"800",color:"#c4b5fd",marginBottom:"8px"}}>🧳 قائمة التجهيز</div>
          {["جواز سفر (صالح 6+ أشهر) + نسخة ورقية","E-Visa مطبوعة أو على الجوال","ملابس فاتحة قطن + مظلة صغيرة","بطاقة بنك + كاش دولار","شاحن universal + محول كهرباء","دواء أساسي + واقي شمس SPF50+","تطبيق Grab محمّل مسبقاً"].map((t,i)=><div key={i} style={{display:"flex",gap:"8px",padding:"5px 0",borderBottom:i<6?"1px solid #4c1d95":"none"}}>
            <span style={{color:"#c4b5fd",flexShrink:0}}>✓</span>
            <div style={{fontSize:"11px",color:"#e9d5ff"}}>{t}</div>
          </div>)}
        </div>
      </div>}

      <div style={{textAlign:"center",padding:"14px",fontSize:"11px",color:"#334155",borderTop:"1px solid #1e293b"}}>
        رحلة سعيدة ومباركة 🇻🇳❤️
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
